<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login - Sistema de Transporte</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Reset e base */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #4facfe, #00f2fe); 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    padding: 20px;
  }

  /* Container principal */
  .container { 
    background: #fff; 
    padding: 40px 35px; 
    border-radius: 20px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
    width: 100%; 
    max-width: 400px; 
    animation: fadeIn 0.6s ease-in-out; 
  }

  /* Logo / Marca */
  .logo {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .logo img {
    width: 70px;
    height: 70px;
  }

  /* Título */
  h1 { 
    text-align: center; 
    margin-bottom: 25px; 
    color: #333; 
    font-size: 26px;
    font-weight: 600;
  }

  /* Inputs */
  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #444;
    font-weight: 500;
  }
  input { 
    width: 100%; 
    padding: 12px; 
    border-radius: 10px; 
    border: 1px solid #ccc; 
    font-size: 15px;
    transition: border-color 0.3s, box-shadow 0.3s; 
  }
  input:focus { 
    border-color: #4facfe; 
    outline: none; 
    box-shadow: 0 0 8px rgba(79,172,254,0.3);
  }

  /* Botão */
  button { 
    width: 100%; 
    padding: 14px; 
    background: linear-gradient(135deg, #4facfe, #00c6fb);
    color: #fff; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    font-size: 16px; 
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s; 
  }
  button:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
  }

  /* Links */
  p { text-align: center; margin-top: 18px; color: #666; font-size: 14px; }
  a { 
    color: #4facfe; 
    text-decoration: none; 
    font-weight: 500; 
  }
  a:hover { text-decoration: underline; }

  /* Animação */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsividade */
  @media (max-width: 480px) {
    .container { padding: 30px 20px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <!-- Você pode trocar por sua logo -->
    <img src="https://cdn-icons-png.flaticon.com/512/942/942748.png" alt="Logo Transporte">
  </div>
  <h1>Acesso ao Sistema</h1>
  <form id="loginForm">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu email" required />
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Digite sua senha" required />
    </div>
    <button type="submit">Entrar</button>
  </form>
  <p>Não tem conta? <a href="register.html">Cadastre-se</a></p>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email,password})
    });

    const data = await res.json();
    if (data.token) { 
      localStorage.setItem('token', data.token); 
      window.location.href='/dashboard.html'; 
    }
    else {
      alert(data.error || 'Credenciais inválidas');
    }
  } catch (err) {
    alert('Erro de conexão com o servidor');
  }
});
</script>
</body>
</html>
