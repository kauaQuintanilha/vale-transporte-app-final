<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro - Vale Transporte</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1976D2, #42A5F5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    background: #fff;
    padding: 40px 35px;
    border-radius: 18px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 380px;
    animation: fadeIn 0.6s ease-in-out;
  }

  h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #1976D2;
    font-size: 28px;
    font-weight: bold;
  }

  .form-group {
    position: relative;
    margin-bottom: 18px;
  }

  .form-group input {
    width: 100%;
    padding: 14px 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 15px;
    transition: all 0.3s ease;
  }

  .form-group label {
    position: absolute;
    top: 14px;
    left: 12px;
    font-size: 14px;
    color: #777;
    pointer-events: none;
    transition: 0.3s ease;
  }

  .form-group input:focus,
  .form-group input:valid {
    border-color: #1976D2;
    box-shadow: 0 0 6px rgba(25, 118, 210, 0.4);
  }

  .form-group input:focus + label,
  .form-group input:valid + label {
    top: -8px;
    left: 10px;
    font-size: 12px;
    color: #1976D2;
    background: #fff;
    padding: 0 5px;
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1976D2, #1565C0);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s ease;
    margin-top: 5px;
  }

  button:hover {
    background: linear-gradient(135deg, #1E88E5, #0D47A1);
  }

  p {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    color: #444;
  }

  a {
    color: #1976D2;
    text-decoration: none;
    font-weight: 600;
  }

  a:hover {
    text-decoration: underline;
  }

  .notification {
    display: none;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
  }

  .success {
    background: #E8F5E9;
    color: #2E7D32;
    border: 1px solid #A5D6A7;
  }

  .error {
    background: #FFEBEE;
    color: #C62828;
    border: 1px solid #EF9A9A;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Cadastro</h1>
  <form id="registerForm">
    <div class="form-group">
      <input type="text" id="name" required />
      <label for="name">Nome completo</label>
    </div>
    <div class="form-group">
      <input type="text" id="cpf" maxlength="14" required />
      <label for="cpf">CPF</label>
    </div>
    <div class="form-group">
      <input type="date" id="dob" required />
      <label for="dob">Data de nascimento</label>
    </div>
    <div class="form-group">
      <input type="text" id="phone" maxlength="15" required />
      <label for="phone">Telefone</label>
    </div>
    <div class="form-group">
      <input type="email" id="email" required />
      <label for="email">Email</label>
    </div>
    <div class="form-group">
      <input type="password" id="password" required />
      <label for="password">Senha</label>
    </div>
    <button type="submit">Cadastrar</button>
  </form>
  <div id="notification" class="notification"></div>
  <p>Já tem conta? <a href="login.html">Entrar</a></p>
</div>

<script>
// Máscara CPF
document.getElementById('cpf').addEventListener('input', (e) => {
  let value = e.target.value.replace(/\D/g, "");
  if (value.length > 11) value = value.slice(0, 11);
  value = value.replace(/(\d{3})(\d)/, "$1.$2");
  value = value.replace(/(\d{3})(\d)/, "$1.$2");
  value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  e.target.value = value;
});

// Máscara Telefone
document.getElementById('phone').addEventListener('input', (e) => {
  let value = e.target.value.replace(/\D/g, "");
  if (value.length > 11) value = value.slice(0, 11);

  if (value.length <= 10) { // fixo
    value = value.replace(/(\d{2})(\d)/, "($1) $2");
    value = value.replace(/(\d{4})(\d)/, "$1-$2");
  } else { // celular
    value = value.replace(/(\d{2})(\d)/, "($1) $2");
    value = value.replace(/(\d{5})(\d)/, "$1-$2");
  }
  e.target.value = value;
});

// Submissão do Formulário
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const cpf = document.getElementById('cpf').value.replace(/\D/g, "");
  const dob = document.getElementById('dob').value;
  const phone = document.getElementById('phone').value.replace(/\D/g, "");
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const res = await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, cpf, dob, phone, email, password})
  });

  const data = await res.json();
  const notification = document.getElementById('notification');

  if (data.message) { 
    notification.textContent = data.message;
    notification.className = "notification success";
    notification.style.display = "block";
    setTimeout(() => window.location.href='/login.html', 2000);
  } else {
    notification.textContent = data.error || "Erro no cadastro!";
    notification.className = "notification error";
    notification.style.display = "block";
  }
});
</script>
</body>
</html>
